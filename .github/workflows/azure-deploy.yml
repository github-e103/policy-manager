name: Deploy Node.js to Azure App Service

on:
  push:
    branches:
      - main  

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24'  

      - name: Install dependencies
        run: npm install

      - name: Build (if applicable)
        run: npm run build --if-present

      - name: Copy Source Sans 3 fonts to frontend
        run: |
          mkdir -p frontend/fonts
          for w in 400 600 700; do
            cp "node_modules/@fontsource/source-sans-3/files/source-sans-3-latin-${w}-normal.woff2" \
               "frontend/fonts/source-sans-3-${w}.woff2"
          done

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'policy-manager'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
