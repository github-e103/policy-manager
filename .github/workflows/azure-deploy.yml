name: Deploy Node.js to Azure App Service

on:
  push:
    branches:
      - main  

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24'  

      - name: Install dependencies
        run: npm install

      - name: Build (if applicable)
        run: npm run build --if-present

      - name: Bundle Chrome system libraries
        run: |
          CHROME=$(find .puppeteer-cache -name 'chrome' -type f 2>/dev/null | head -1)
          if [ -n "$CHROME" ]; then
            mkdir -p lib
            ldd "$CHROME" 2>/dev/null \
              | grep "=> /" | awk '{print $3}' \
              | grep -v 'ld-linux' \
              | xargs -I{} cp --no-clobber {} lib/ 2>/dev/null || true
            echo "Bundled $(ls lib/ | wc -l) system libraries alongside Chrome"
          else
            echo "Chrome binary not found — skipping lib bundle"
          fi

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'policy-manager'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
