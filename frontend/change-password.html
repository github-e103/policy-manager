<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PolicyManager — Change Password</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-brand">
    <div class="brand-icon">📋</div>
    Elara Health - PolicyManager
  </div>
  <div class="navbar-actions">
    <a href="/" class="btn btn-outline">&#8592; Back to Policies</a>
    <div id="nav-user-area"></div>
  </div>
</nav>

<div id="toast-container"></div>

<div class="container" style="max-width:480px;margin-top:48px;">
  <div class="card" style="padding:36px 40px;">
    <h2 style="margin-bottom:24px;font-size:1.25rem;">Change Password</h2>

    <div id="error-msg" class="alert alert-error" style="display:none;margin-bottom:16px;"></div>
    <div id="success-msg" class="alert alert-success" style="display:none;margin-bottom:16px;">
      Password changed successfully.
    </div>

    <form id="change-pw-form">
      <div class="form-group">
        <label class="form-label">Current Password</label>
        <input type="password" id="current-pw" class="form-input" required autocomplete="current-password">
      </div>
      <div class="form-group">
        <label class="form-label">New Password</label>
        <input type="password" id="new-pw" class="form-input" required autocomplete="new-password" minlength="6">
      </div>
      <div class="form-group">
        <label class="form-label">Confirm New Password</label>
        <input type="password" id="confirm-pw" class="form-input" required autocomplete="new-password" minlength="6">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px;">Update Password</button>
    </form>
  </div>
</div>

<script src="/app.js"></script>
<script>
  const form      = document.getElementById('change-pw-form');
  const errorMsg  = document.getElementById('error-msg');
  const successMsg = document.getElementById('success-msg');

  form.addEventListener('submit', async e => {
    e.preventDefault();
    errorMsg.style.display  = 'none';
    successMsg.style.display = 'none';

    const currentPassword = document.getElementById('current-pw').value;
    const newPassword     = document.getElementById('new-pw').value;
    const confirmPassword = document.getElementById('confirm-pw').value;

    if (newPassword !== confirmPassword) {
      errorMsg.textContent  = 'New passwords do not match.';
      errorMsg.style.display = '';
      return;
    }

    const btn = form.querySelector('button[type="submit"]');
    btn.disabled = true;
    btn.textContent = 'Updating…';
    try {
      const res  = await fetch('/api/change-password', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ currentPassword, newPassword }),
      });
      const data = await res.json();
      if (!res.ok) {
        errorMsg.textContent  = data.error || 'An error occurred.';
        errorMsg.style.display = '';
      } else {
        successMsg.style.display = '';
        form.reset();
      }
    } catch {
      errorMsg.textContent  = 'Network error. Please try again.';
      errorMsg.style.display = '';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Update Password';
    }
  });
</script>

<style>
  .alert { padding: 10px 14px; border-radius: 7px; font-size: .9rem; }
  .alert-error   { background:#fff1f0; border:1px solid #fca5a5; color:#b91c1c; }
  .alert-success { background:#f0fdf4; border:1px solid #86efac; color:#15803d; }
</style>

</body>
</html>
