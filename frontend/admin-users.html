<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PolicyManager — User Management</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-brand">
    <div class="brand-icon">📋</div>
    Elara Health - PolicyManager
  </div>
  <div class="navbar-actions">
    <a href="/" class="btn btn-outline">&#8592; Back to Policies</a>
    <div id="nav-user-area"></div>
  </div>
</nav>

<div id="toast-container"></div>

<div class="container" style="margin-top:36px;">

  <!-- User list -->
  <div class="card" style="margin-bottom:28px;">
    <div class="page-header" style="padding:20px 24px 0;">
      <h2 style="font-size:1.15rem;">System Users</h2>
    </div>
    <div class="table-wrapper" style="margin-top:12px;">
      <table class="policies-table">
        <thead>
          <tr>
            <th>Username</th>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Title</th>
            <th>Role</th>
            <th>Created</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="users-tbody">
          <tr><td colspan="6" class="loading-cell"><div class="spinner"></div> Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Edit user modal -->
  <dialog id="edit-modal" style="border:none;border-radius:12px;padding:32px;width:460px;box-shadow:0 8px 32px rgba(0,0,0,.2);">
    <h2 style="font-size:1.1rem;margin-bottom:20px;">Edit User</h2>
    <div id="edit-error" class="alert alert-error" style="display:none;margin-bottom:16px;"></div>
    <form id="edit-user-form">
      <input type="hidden" id="edit-id">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 16px;">
        <div class="form-group">
          <label class="form-label">First Name</label>
          <input type="text" id="edit-first-name" class="form-input" required>
        </div>
        <div class="form-group">
          <label class="form-label">Last Name</label>
          <input type="text" id="edit-last-name" class="form-input" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Title</label>
        <input type="text" id="edit-title" class="form-input" placeholder="e.g. Chief Compliance Officer">
      </div>
      <div class="form-group">
        <label class="form-label">Role</label>
        <select id="edit-role" class="form-input">
          <option value="normal">Normal</option>
          <option value="approver">Approver</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px;">
        <button type="button" class="btn btn-secondary" id="edit-cancel" style="color:#333;border-color:#ccc;">Cancel</button>
        <button type="submit" class="btn btn-primary" id="edit-save-btn">Save Changes</button>
      </div>
    </form>
  </dialog>

  <!-- Add user form -->
  <div class="card" style="max-width:520px;padding:28px 32px;">
    <h2 style="font-size:1.1rem;margin-bottom:20px;">Add New User</h2>

    <div id="add-error" class="alert alert-error" style="display:none;margin-bottom:16px;"></div>
    <div id="add-success" class="alert alert-success" style="display:none;margin-bottom:16px;"></div>

    <form id="add-user-form">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 16px;">
        <div class="form-group">
          <label class="form-label">First Name</label>
          <input type="text" id="first-name" class="form-input" required>
        </div>
        <div class="form-group">
          <label class="form-label">Last Name</label>
          <input type="text" id="last-name" class="form-input" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" id="username" class="form-input" required autocomplete="off"
               pattern="[a-zA-Z0-9_\-]+" title="Letters, numbers, underscores and hyphens only">
      </div>
      <div class="form-group">
        <label class="form-label">Title <span style="font-size:.8rem;color:#888;">(appears on policy metadata)</span></label>
        <input type="text" id="title" class="form-input" placeholder="e.g. Chief Compliance Officer">
      </div>
      <div class="form-group">
        <label class="form-label">Role</label>
        <select id="role" class="form-input">
          <option value="normal">Normal — can create and edit policies</option>
          <option value="approver">Approver — can create, edit, and approve policies</option>
          <option value="admin">Admin — full access including user management</option>
        </select>
      </div>
      <p style="font-size:.82rem;color:#888;margin-bottom:16px;">
        Initial password will be set to <strong>changeme</strong>. The user should change it on first login.
      </p>
      <button type="submit" class="btn btn-primary">Add User</button>
    </form>
  </div>
</div>

<script src="/app.js"></script>
<script>
  async function loadUsers() {
    const tbody = document.getElementById('users-tbody');
    try {
      const res   = await fetch('/api/admin/users');
      if (!res.ok) throw new Error('Failed to load users');
      const users = await res.json();
      if (!users.length) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#999;padding:20px;">No users found</td></tr>';
        return;
      }
      const roleBadge = r => r === 'admin' ? 'badge-approved' : r === 'approver' ? 'badge-review' : 'badge-draft';
      const roleLabel = r => r === 'admin' ? 'Admin' : r === 'approver' ? 'Approver' : 'Normal';
      tbody.innerHTML = users.map(u => `
        <tr>
          <td><strong>${escHtml(u.username)}</strong></td>
          <td>${escHtml(u.first_name || '—')}</td>
          <td>${escHtml(u.last_name  || '—')}</td>
          <td>${escHtml(u.title || '—')}</td>
          <td><span class="badge ${roleBadge(u.role)}">${roleLabel(u.role)}</span></td>
          <td>${new Date(u.created_at).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'})}</td>
          <td><button class="btn btn-outline btn-sm edit-btn"
                data-id="${u.id}" data-first="${escHtml(u.first_name||'')}"
                data-last="${escHtml(u.last_name||'')}" data-title="${escHtml(u.title||'')}"
                data-role="${u.role}">Edit</button></td>
        </tr>
      `).join('');
    } catch (e) {
      tbody.innerHTML = `<tr><td colspan="6" class="error-cell">${e.message}</td></tr>`;
    }
  }

  document.getElementById('add-user-form').addEventListener('submit', async e => {
    e.preventDefault();
    const errEl = document.getElementById('add-error');
    const okEl  = document.getElementById('add-success');
    errEl.style.display = 'none';
    okEl.style.display  = 'none';

    const payload = {
      username:  document.getElementById('username').value.trim(),
      firstName: document.getElementById('first-name').value.trim(),
      lastName:  document.getElementById('last-name').value.trim(),
      title:     document.getElementById('title').value.trim(),
      role:      document.getElementById('role').value,
    };

    const btn = e.target.querySelector('button[type="submit"]');
    btn.disabled = true;
    btn.textContent = 'Adding…';
    try {
      const res  = await fetch('/api/admin/users', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(payload),
      });
      const data = await res.json();
      if (!res.ok) {
        errEl.textContent  = data.error || 'Failed to add user.';
        errEl.style.display = '';
      } else {
        okEl.textContent   = `User "${data.username}" added successfully.`;
        okEl.style.display = '';
        e.target.reset();
        loadUsers();
      }
    } catch {
      errEl.textContent  = 'Network error. Please try again.';
      errEl.style.display = '';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Add User';
    }
  });

  // Edit modal wiring
  const modal     = document.getElementById('edit-modal');
  const editForm  = document.getElementById('edit-user-form');
  const editError = document.getElementById('edit-error');

  document.getElementById('users-tbody').addEventListener('click', e => {
    const btn = e.target.closest('.edit-btn');
    if (!btn) return;
    editError.style.display = 'none';
    document.getElementById('edit-id').value         = btn.dataset.id;
    document.getElementById('edit-first-name').value = btn.dataset.first;
    document.getElementById('edit-last-name').value  = btn.dataset.last;
    document.getElementById('edit-title').value      = btn.dataset.title;
    document.getElementById('edit-role').value       = btn.dataset.role;
    modal.showModal();
  });

  document.getElementById('edit-cancel').addEventListener('click', () => modal.close());
  modal.addEventListener('click', e => { if (e.target === modal) modal.close(); });

  editForm.addEventListener('submit', async e => {
    e.preventDefault();
    editError.style.display = 'none';
    const saveBtn = document.getElementById('edit-save-btn');
    saveBtn.disabled = true; saveBtn.textContent = 'Saving…';
    try {
      const res = await fetch(`/api/admin/users/${document.getElementById('edit-id').value}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          firstName: document.getElementById('edit-first-name').value.trim(),
          lastName:  document.getElementById('edit-last-name').value.trim(),
          title:     document.getElementById('edit-title').value.trim(),
          role:      document.getElementById('edit-role').value,
        }),
      });
      const data = await res.json();
      if (!res.ok) { editError.textContent = data.error || 'Save failed.'; editError.style.display = ''; return; }
      modal.close();
      toast('User updated successfully', 'success');
      loadUsers();
    } catch {
      editError.textContent = 'Network error. Please try again.';
      editError.style.display = '';
    } finally {
      saveBtn.disabled = false; saveBtn.textContent = 'Save Changes';
    }
  });

  loadUsers();
</script>

<style>
  .alert { padding: 10px 14px; border-radius: 7px; font-size: .9rem; }
  .alert-error   { background:#fff1f0; border:1px solid #fca5a5; color:#b91c1c; }
  .alert-success { background:#f0fdf4; border:1px solid #86efac; color:#15803d; }
</style>

</body>
</html>
